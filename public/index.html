<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slowpoke Racers</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <section id="view-landing" class="view">
      <h1>Slowpoke Racers</h1>
      <p class="subtitle">A typing race for the slowest animals around.</p>
      <input id="name-input" type="text" placeholder="Your name" maxlength="16" />

      <div class="panel">
        <button id="create-btn" class="btn-primary">Create Room</button>
      </div>

      <div class="panel join-row">
        <input id="code-input" type="text" placeholder="Room code" maxlength="4" />
        <button id="join-btn">Join Room</button>
      </div>

      <p id="landing-error" class="error"></p>
    </section>

    <section id="view-lobby" class="view" hidden>
      <h2>Room <span id="room-code-display" class="room-code"></span></h2>
      <p class="subtitle">Share this code with your friends so they can join.</p>
      <ul id="player-list" class="player-list"></ul>
      <button id="start-btn" class="btn-primary">Start Race</button>
      <p id="lobby-hint" class="hint"></p>
    </section>

    <section id="view-race" class="view" hidden>
      <div id="countdown" class="countdown"></div>
      <div id="track" class="track"></div>
      <div id="phrase-display" class="phrase-display"></div>
      <input id="typing-input" class="typing-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" disabled />
      <p id="race-hint" class="hint"></p>
    </section>

    <section id="view-results" class="view" hidden>
      <h2>Results</h2>
      <ul id="results-list" class="results-list"></ul>
      <button id="rematch-btn" class="btn-primary">Race Again</button>
      <p id="results-hint" class="hint"></p>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
